<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Houdini Grid Paint</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="stage">
      <div class="title">CSS Paint Worklet</div>
      <div class="hint">Tweak <code>--grid-density</code> and <code>--hue</code> in style.css</div>
    </div>
    <script>
      // CSS Paint Worklet's addModule() uses the browser's worklet resource
      // loader, which bypasses any window.fetch override (including the one
      // WebFX Studio injects to back the virtual filesystem). So we fetch the
      // source ourselves through fetch() (which the host's bridge intercepts)
      // and hand addModule a Blob URL it can resolve normally.
      if ('paintWorklet' in CSS) {
        fetch('./grid.worklet.js')
          .then(function (r) {
            return r.text();
          })
          .then(function (src) {
            var blob = new Blob([src], { type: 'application/javascript' });
            var url = URL.createObjectURL(blob);
            return CSS.paintWorklet.addModule(url);
          })
          .then(function () {
            console.log('Houdini Paint Worklet registered: grid');
          })
          .catch(function (e) {
            console.error('Worklet registration failed: ' + (e && e.message ? e.message : e));
          });
      } else {
        console.warn('CSS Paint Worklet is not supported in this browser.');
        document.body.classList.add('no-worklet');
      }
    </script>
  </body>
</html>
