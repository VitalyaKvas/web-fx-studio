<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SVG Turbulence</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #08080a;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #fafafa;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
      }
      .frame {
        width: 80vmin;
        height: 80vmin;
        position: relative;
      }
      svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .caption {
        position: absolute;
        bottom: -28px;
        left: 0;
        right: 0;
        font-size: 12px;
        color: #868684;
        text-align: center;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .a {
        animation: drift 12s linear infinite;
      }
      @keyframes drift {
        0% {
          baseFrequency: 0.008;
        }
        50% {
          baseFrequency: 0.022;
        }
        100% {
          baseFrequency: 0.008;
        }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#217eff" />
            <stop offset="100%" stop-color="#a371f7" />
          </linearGradient>
          <filter id="turb">
            <feTurbulence id="turbCore" type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="3">
              <animate attributeName="baseFrequency" dur="9s" values="0.008;0.024;0.008" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="22" />
          </filter>
        </defs>
        <rect
          x="20"
          y="20"
          width="280"
          height="280"
          rx="40"
          fill="url(#grad)"
          filter="url(#turb)"
        />
      </svg>
      <div class="caption">SVG · feTurbulence · feDisplacementMap</div>
    </div>
    <script>
      console.log('SVG Turbulence — filter chain running');
    </script>
  </body>
</html>
